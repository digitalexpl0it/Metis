[workspace]
resolver = "2"
members = [
    "metis-grid",
    "metis-protocol",
    "metis-compositor",
    "metis-shell",
]

[workspace.package]
edition = "2021"
license = "MIT"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", default-features = false, features = ["fmt", "env-filter"] }
metis-grid = { path = "metis-grid" }
metis-protocol = { path = "metis-protocol" }

# Compile third-party dependencies optimized even in dev builds. Without this,
# the `image` crate decodes/resizes the wallpaper ~50-100x slower (multi-second
# stalls). Our own crates stay unoptimized for fast, debuggable iteration.
[profile.dev.package."*"]
opt-level = 3
